<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Montserrat:wght@300;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/contacto.css">
    <title>Contacto</title>
</head>
<body>
    <header>
        <a href="index.html"> GASPAR MARTÍNEZ</a>
        <div class="enlacesHeader">
            <a href="proyectos.html">PROYECTOS</a>
            <a href="about.html">ABOUT</a>
            <a href="exp.html">EXPERIENCIA</a>
        </div>
        <a href="contacto.html">
            <button type="button">CONTACTO</button>
        </a>
    </header>

    <main>
        <img src="img/photos/contacto.jpg" alt="Imagen de contacto">
        <section>
            <h1>¿Estás interesado?</h1>
            <h2>Contacta conmigo para más información.</h2>
            <div class="contact-container">
                <div class="contact-item">
                    <span>+34 683 11 16 44</span>
                </div>
                <div class="contact-item">
                    <span>gasparmartinezrubio@gmail.com</span>
                </div>
            </div>

            <form>
                <div class="contact-form">
                    <div class="field-name">
                        <h4>Nombre</h4>
                        <input id="name" placeholder="Ingresa tu nombre">
                    </div>
    
                    <div class="field-email">
                        <h4>Email</h4>
                        <input id="email" placeholder="Ingresa tu email">
                    </div>
    
                    <div class="field-message">
                        <h4>Mensaje</h4>
                        <textarea id="message" placeholder="Ingresa el mensaje" rows="10"></textarea>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Enviar</button>
            </form>
        </section>
    </main>

    <footer>
        <span>Desarrollado por Gaspar Martínez</span>
    </footer>
</body>
</html>
